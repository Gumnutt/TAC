"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Grid
group: Layout
status: stable
props:
  type: object
  required:
    - columns
    - mobile_columns
  properties:
    width:
      type: string
      title: Grid width
      enum:
        - "100%"
        - "90%"
        - "80%"
        - "70%"
        - "60%"
        - "50%"
      default: "100%"
      examples:
        - "100%"
    columns:
      type: string
      title: Columns
      description: Layout selected applies on desktop and tablet.
      enum:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
        - "75-25"
        - "25-75"
        - "67-33"
        - "33-67"
        - "50-25-25"
        - "25-25-50"
      meta:enum:
        "1" : "1 column"
        "2" : "2 columns"
        "3" : "3 columns"
        "4" : "4 columns"
        "5" : "5 columns"
        "6" : "6 columns"
        75-25 : "2 columns 75%-25%"
        25-75 : "2 columns 25%-75%"
        67-33 : "2 columns 67%-33%"
        33-67 : "2 columns 33%-67%"
        50-25-25 : "3 columns 50%-25%-25%"
        25-25-50 : "3 columns 25%-25%-50%"
      examples:
        - "2"
      default:
        - "2"
    mobile_columns:
      type: string
      title: Columns on mobile
      enum:
        - "1"
        - "2"
        - "3"
      examples:
        - "1"

slots:
  main_slot:
    title: "Grid"
