$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Image
status: stable
group: Dripyard Basic
props:
  type: object
  properties:
    image:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: assets/cliff-waterfall.jpg
          alt: 'Placeholder'
          width: 2000
          height: 1500
    image_link:
      title: Link image (optional)
      type: string
      format: uri-reference
    border_radius:
      title: Border radius
      type: string
      enum:
        - sm
        - md
        - lg
        - xl
      meta:enum:
        sm: Small
        md: Medium
        lg: Large
        xl: Extra large
    width:
      title: Image width
      type: number
      examples: [ 800 ]
    alt:
      title: Alt text override
      type:
        - string
        - 'null'
      description: 'Override the alt text if necessary'
    loading:
      title: Image loading
      description: 'Keep this set to "lazy" unless you are absolutely sure this will always appear "Above the fold" on page load.'
      type: string
      enum:
        - eager
        - lazy
      meta:enum:
        eager: Eager
        lazy: Lazy (recommended)
      examples: [ lazy ]