"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Hero
group: Hero
props:
  type: object
  required:
    - height
    - flex_position
    - object_position
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - standard
        - floating
      meta:enum:
        standard: Edge to edge (default)
        floating: Floating
      default: standard
      examples:
        - standard
    height:
      type: string
      title: Height
      enum:
        - full
        - large
        - ribbon
      meta:enum:
        full: Full screen
        large: Large
        ribbon: Ribbon
      default: full
      examples:
        - full
    flex_position:
      type: string
      title: Content position
      enum:
        - left
        - right
        - center
      meta:enum:
        left: Left
        right: Right
        center: Center
      default: left
      examples:
        - left
    content_background:
      type: boolean
      title: Content background
      default: false
      examples:
        - false
    object_position:
      type: string
      title: Background image position
      enum:
        - top
        - center
        - bottom
      default: center
      examples:
        - center
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Background image
      type: object
      examples:
        - src: "assets/fakhrir-amrullah-FXMZncDmgNc-unsplash.jpg"
          alt: "Photo of the tops of rainforest trees, with the sun shining through a misty haze"
          width: 1200
          height: 900
    overlap_navbar:
      type: boolean
      title: Overlap header
      description: Enable this to place it behind the header, if it is the first item on the page.
      default: false
      examples:
        - false

slots:
  hero_slot:
    title: "Hero content"

libraryOverrides:
  js:
    hero.js: { attributes: { type: module } }